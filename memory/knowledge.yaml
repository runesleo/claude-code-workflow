    - name: validate
      command: "make validate"
      description: "Validate all YAML files and run checks"
    - name: test
      command: "rake test"
      description: "Run full test suite"
    - name: build
      command: "bin/vibe build claude-code"
      description: "Build Claude Code configuration"

  file_locations:
    core_policies: core/policies/behaviors.yaml
    skill_registry: core/skills/registry.yaml
    platform_configs: config/platforms.yaml
