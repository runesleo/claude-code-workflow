schema_version: 1
status: phase-6-buildable

profiles:
  claude-code-default:
    target: claude-code
    maturity: active
    current_role: first_class_target
    mapping:
      critical_reasoner: claude.opus-class
      workhorse_coder: claude.sonnet-class
      fast_router: claude.haiku-class
      independent_verifier: second-model.cross-family
      cheap_local: local.ollama-class
    notes:
      - Current repository files are optimized for this profile.
      - Keep the verifier in a different model family when possible.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in Claude Code is controlled by:

      1. **Launch-time flag**: `claude --model opus|sonnet|haiku`
      2. **Task tool parameter**: When spawning subagents, use `model: "opus"|"sonnet"|"haiku"`
      3. **Settings file**: Configure defaults in `~/.claude/settings.json` (if supported)

      These mappings guide you to select appropriate models for different task types. See `targets/claude-code.md` for detailed configuration instructions.

  codex-cli-default:
    target: codex-cli
    maturity: planned
    mapping:
      critical_reasoner: openai.high-reasoning
      workhorse_coder: openai.codex-workhorse
      fast_router: openai.fast-agent
      independent_verifier: second-model.cross-family
      cheap_local: local.ollama-class
    notes:
      - Use AGENTS.md as the minimum common instruction surface.
      - Map P0 or P1 actions to native approval or sandbox rules when available.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in Codex CLI is controlled by:

      1. **Environment variables**: `CODEX_PRIMARY_MODEL`, `CODEX_WORKHORSE_MODEL`, `CODEX_FAST_MODEL`
      2. **CLI flags**: `codex --model gpt-4-turbo "your task"`
      3. **Config file**: `~/.codex/config.yaml` (if supported)

      Example:
      ```bash
      export CODEX_PRIMARY_MODEL="gpt-4-turbo"
      export CODEX_FAST_MODEL="gpt-3.5-turbo"
      codex --model gpt-4-turbo "review security implications"
      ```

      See `targets/codex-cli.md` for detailed configuration instructions.

  cursor-default:
    target: cursor
    maturity: planned
    mapping:
      critical_reasoner: cursor.primary-frontier-model
      workhorse_coder: cursor.default-agent-model
      fast_router: cursor.fast-model
      independent_verifier: second-model.or.manual-review
      cheap_local: local.external-runner
    notes:
      - Render portable instructions into rule types rather than assuming native skills.
      - Treat tool-managed memories as cache, not as the workflow SSOT.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in Cursor is configured through:

      1. **Cursor Settings** (Cmd/Ctrl + ,) → Models section
      2. Configure your **Primary Model** (for critical_reasoner and workhorse_coder)
      3. Configure your **Fast Model** (for fast_router)

      Cursor does not support automatic model switching per task. The AI will see these routing rules but cannot programmatically switch models. You may need to manually switch models for critical tasks.

      See `targets/cursor.md` for detailed configuration instructions.

  opencode-default:
    target: opencode
    maturity: planned
    mapping:
      critical_reasoner: configured.primary-high-reasoning
      workhorse_coder: configured.primary-coder
      fast_router: configured.fast-agent
      independent_verifier: second-model.cross-family
      cheap_local: local.ollama-class
    notes:
      - Prefer native OpenCode rules and permissions where possible.
      - OpenCode can often reuse AGENTS.md and Claude-style skill assets with light adaptation.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in OpenCode is configured in `opencode.json`:

      ```json
      {
        "models": {
          "primary": "claude-opus-4-6",
          "coder": "claude-sonnet-4-6",
          "fast": "claude-haiku-4-5"
        }
      }
      ```

      OpenCode supports flexible model configuration with multiple providers. You can mix Anthropic, OpenAI, and local models.

      See `targets/opencode.md` for detailed configuration instructions.

  warp-default:
    target: warp
    maturity: planned
    mapping:
      critical_reasoner: warp.primary-frontier-model
      workhorse_coder: warp.default-agent-model
      fast_router: warp.fast-model
      independent_verifier: second-model.or.manual-review
      cheap_local: local.external-runner
    notes:
      - Use WARP.md as the project rule entrypoint and keep repo-local files as the SSOT.
      - Treat Warp workflows as wrappers around project commands, not as canonical state.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in Warp is configured through:

      1. **Warp Settings** → AI or Assistant settings
      2. Configure your AI provider (Anthropic Claude, OpenAI, etc.)
      3. Select your preferred model

      Warp typically uses a single configured AI model for all interactions. The routing rules help the AI understand task criticality and adjust its approach accordingly.

      See `targets/warp.md` for detailed configuration instructions.

  antigravity-default:
    target: antigravity
    maturity: planned
    mapping:
      critical_reasoner: antigravity.primary-frontier-model
      workhorse_coder: antigravity.default-agent-model
      fast_router: antigravity.fast-model
      independent_verifier: second-model.or.manual-review
      cheap_local: local.external-runner
    notes:
      - Antigravity uses multi-agent workflows and task tracking markdown documents natively.
      - Generated files provide the routing, instructions, and capability baselines.

  vscode-default:
    target: vscode
    maturity: planned
    mapping:
      critical_reasoner: copilot.primary-model
      workhorse_coder: copilot.default-agent-model
      fast_router: copilot.fast-model
      independent_verifier: second-model.or.manual-review
      cheap_local: local.external-runner
    notes:
      - VS Code settings integrate these rules as workspace-level instructions for GitHub Copilot.
      - The `AGENTS.md` and `.vibe/vscode/` docs serve as an explicit capability baseline.

  kimi-code-default:
    target: kimi-code
    maturity: planned
    mapping:
      critical_reasoner: kimi.k2.5-class
      workhorse_coder: kimi.default-class
      fast_router: kimi.fast-class
      independent_verifier: second-model.or.manual-review
      cheap_local: local.ollama-class
    notes:
      - Kimi Code uses SKILL.md files for capabilities. Generate portable skills into `.agents/skills/`.
      - Use `KIMI.md` as the project entrypoint for top-level instructions.
      - Tool restrictions in skills enforce safety policy at the capability level.

  glm-family-default:
    target: generic-open-weight
    maturity: exploratory
    mapping:
      critical_reasoner: glm.or.other.frontier-open-family
      workhorse_coder: glm.or.other.coding-workhorse
      fast_router: glm.or.other.fast-small-model
      independent_verifier: separate-model-family
      cheap_local: locally-hosted-default
    notes:
      - Exploratory placeholder profile only; `generic-open-weight` is not a build target in `bin/vibe`.
      - Benchmark each tier against your own tasks before enabling it by default.
      - Keep local deployment concerns outside the portable routing policy.
